name: SpotWave

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spotwave
      POSTGRES_USER: spotwave
      POSTGRES_PASSWORD: spotwave
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spotwave -d spotwave']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://spotwave:spotwave@postgres:5432/spotwave
      JWT_SECRET: spotwave-dev-secret
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
    ports:
      - '3333:3333'
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3333/health/ready').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: ../..
      dockerfile: infrastructure/docker/backend.Dockerfile
      target: deps
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://spotwave:spotwave@postgres:5432/spotwave
      JWT_SECRET: spotwave-dev-secret
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -lc
      - pnpm --filter @spotwave/database exec prisma db push --schema prisma/schema --accept-data-loss && pnpm --filter @spotwave/database exec prisma db seed

  backend-test:
    build:
      context: ../..
      dockerfile: infrastructure/docker/backend.Dockerfile
      target: build
    environment:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: postgresql://spotwave:spotwave@postgres:5432/spotwave
      JWT_SECRET: spotwave-dev-secret
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    profiles:
      - tests
    command:
      - sh
      - -lc
      - pnpm --filter @spotwave/backend test:e2e

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3333
    ports:
      - '3000:3000'
    depends_on:
      - backend

  b2b-admin:
    build:
      context: ../..
      dockerfile: infrastructure/docker/b2b-admin.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3333
    ports:
      - '3001:3001'
    depends_on:
      - backend

volumes:
  postgres_data:
