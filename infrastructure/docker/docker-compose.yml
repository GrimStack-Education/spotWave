services:
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - '3333:3333'

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - backend
