app = "spotwave-b2b-admin"
primary_region = "fra"

[build]
  dockerfile = "infrastructure/docker/b2b-admin.Dockerfile"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://spotwave-backend.fly.dev"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_API_URL = "https://spotwave-backend.fly.dev"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
