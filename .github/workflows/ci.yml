name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['main', 'develop']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker compose -f infrastructure/docker/docker-compose.yml build backend

      - name: Start postgres
        run: docker compose -f infrastructure/docker/docker-compose.yml up -d postgres

      - name: Apply database schema
        run: docker compose -f infrastructure/docker/docker-compose.yml run --rm migrator

      - name: Run backend e2e tests (Docker-only)
        run: docker compose -f infrastructure/docker/docker-compose.yml run --rm backend-test

      - name: Start backend
        run: docker compose -f infrastructure/docker/docker-compose.yml up -d backend

      - name: Smoke check API
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /tmp/smoke_root.txt -w "%{http_code}" http://localhost:3333/)
            if [ "$code" = "200" ]; then
              break
            fi
            sleep 2
          done
          test "$code" = "200"

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p .ci-logs
          docker compose -f infrastructure/docker/docker-compose.yml ps > .ci-logs/compose-ps.txt
          docker compose -f infrastructure/docker/docker-compose.yml logs > .ci-logs/compose-logs.txt

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: .ci-logs

      - name: Teardown
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.yml down -v
