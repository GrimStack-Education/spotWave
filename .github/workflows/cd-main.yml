name: CD Main

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: spotwave-backend
            dockerfile: infrastructure/docker/backend.Dockerfile
          - image: spotwave-frontend
            dockerfile: infrastructure/docker/frontend.Dockerfile
          - image: spotwave-b2b-admin
            dockerfile: infrastructure/docker/b2b-admin.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image namespace
        id: image_namespace
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.image_namespace.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.image_namespace.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
